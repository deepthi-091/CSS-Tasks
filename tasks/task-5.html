<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       
.hero {
    height: 100vh; 
    background-image: url('images/product.webp'); 
    background-size: cover;  
    background-position: center; 
    background-repeat: no-repeat;
    position: relative;
    display: flex;
    justify-content: center;  
    align-items: center;     
    text-align: center;      
    color: white;           
}

.hero-content {
    position: relative;
    z-index: 2;  
}
.hero-content button {
    padding: 12px 25px;
    margin-top: 15px;
    font-size: 16px;
    border: none;
    border-radius: 5px;
    background-color: #ff6f61;
    color: black;
    cursor: pointer;
    transition: background 0.3s;
}

.hero-content button:hover {
    background-color: #ff3b2e;
}

.hero h1 {
    font-size: 3rem;
}

.hero p {
    font-size: 1.2rem;
}
    </style>
</head>
<body>
    <section class="hero">
    <div class="hero-content">
        <h1>Welcome</h1>
        <p>Have a nice experience</p>
        <button>click me to experience</button>
    </div>
</section>
</body>
</html>
