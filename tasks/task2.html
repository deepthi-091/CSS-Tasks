<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width: 300px;
            aspect-ratio: 1/1;
            overflow: hidden;
        }
        .container img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease ;
        }
        .container img:hover{
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="images/product.webp" alt="product-img">
    </div>
</body>
</html>
