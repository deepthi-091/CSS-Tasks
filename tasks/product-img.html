<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to bottom, purple , rgb(104, 198, 226));
        }
        .container{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 250px;
            color: white;
        }
        .img-container{
            width: 100%;
            aspect-ratio: 4/3;
            overflow: hidden;
             
        }
       .img-container img{
        height: 100%;
        width: 100%;
        object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="img-container"><img src="images/product.webp" alt="product-img"></div>
        <h3>Shoes</h3>
        <p>10$</p>
    </div>
</body>
</html>
