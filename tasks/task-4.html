<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            height: 300px;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            left: 0;
        }
        .product-img{
            width: 100%;
            height: 100px;
            display: flex;
            justify-content: center;
            object-fit: cover;
        }
        .product-details{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: white;
            border-bottom: 1px solid #ccc;
        }
        .scroll{
            height:1000px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="product-img">
        <img src="images/product.webp" alt="">
        </div>
        <div class="product-details">
            <h3>Shoes</h3>
            <p>$20</p>
        </div>
    </div>
    <div class="scroll">

    </div>
    
</body>
</html>
