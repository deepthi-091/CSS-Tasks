<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar with Badge</title>
    <style>
        .container {
            width: 150px;
            aspect-ratio: 1/1;         
            position: relative;          
        }

        .container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;   
        }       
        .container span {
            width: 20px;                 
            height: 20px;
            background-color: green;    
            border-radius: 50%;         
            position: absolute;         
            bottom: 0px;                
            right: 25px;                  
            border: 2px solid white;     
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="images/profile1.webp" alt="Avatar">
        <span></span>
    </div>
</body>
</html>
