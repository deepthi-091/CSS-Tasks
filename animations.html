<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SlideIn vs FadeSlide</title>
  <style>
    /* SlideIn: movement only */
    @keyframes slideIn {
      from { transform: translateX(-200px); }
      to { transform: translateX(0); }
    }

    /* FadeSlide: movement + opacity */
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateX(-200px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .container {
      display: flex;
      gap: 40px;
      margin: 50px;
    }

    .box {
      width: 150px;
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
    }

    .slide {
      background: steelblue;
      animation: slideIn 2s ease-out;
    }

    .fadeSlide {
      background: orange;
      animation: fadeSlide 2s ease-out;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box slide">SlideIn</div>
    <div class="box fadeSlide">FadeSlide</div>
  </div>
</body>
</html>
