<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        
        }
        .card{
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid blue;
            background-color: antiquewhite;
            padding: 5px;
            animation: page 1s ease-out forwards;
            z-index: 101;
            
        }
        .card img{
            width: 120px;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite alternate;
            top: 0;
        }
        .btn{
            display: flex;
            gap: 10px;
        }
        button{
            padding: 10px 20px;
            border: none;
            background-color: dodgerblue;
            color: white;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        button:hover{
            background-color: darkblue;
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .shapes{
            display: flex;
            gap: 2px;
            
        
            
        }
        .shape{
            width: 60px;
            height: 60px;
            background-color:lightblue;
            border-radius: 50%;
            position: absolute;
            animation: shapesanimation 8s linear infinite;
            z-index: 100;
        }
        .shape:nth-child(1){
            width: 80px;
            height: 80px;
            top: 20%;
            left: -100px;
            animation-delay: 0s;
        }
        .shape:nth-child(2){
            top: 50%;
            left: -150px;
            animation-delay: 2s;
        }
        .shape:nth-child(3){
            width: 100px;
            height: 100px;
            top: 80%;
            left: -200px;
            animation-delay: 4s;
        }
        @keyframes shapesanimation{
            from{transform: translateX(0); }
            to{transform: translateX(120vw);}
        }
        @keyframes page{
            from{opacity: 0; transform: translateY(40px);}
            to{opacity: 1; transform: translateY(0px);}
        }
        @keyframes pulse{
            0%,100%{opacity: 0.5; transform: scale(1);}
            50%{opacity: 1; transform: scale(1.08);}
        }
        @media (max-width:600px){
            .card{
                width: 90%;
            }
            .btn{
                flex-direction: column;
                gap: 10px;
            }
        }
        @media(min-width:601px) and (max-width:1024px){
            .card{
                width: 70%;
            }
            .btn{
                flex-direction: row;
            }
        }
        @media (min-width:1025px){
         .card{
            width: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="profilepic.jfif" alt="profilepic">
        <h2>Deepthi</h2>
        <p>i am working in gss company</p>
        <section class="btn">
            <button>Follow</button>
            <button>Message</button>
        </section>
    </div>
    <div class="shapes">
        <span class="shape"></span>
        <span class="shape"></span>
        <span class="shape"></span>
    </div>
</body>
</html>
