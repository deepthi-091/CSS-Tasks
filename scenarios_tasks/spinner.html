<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spinner Demo</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #F8FAFC;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 6px solid #e4f0e2;       /* light border */
      border-bottom: 6px solid #4F46E5;   /* Indigo accent */
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0%); }
      to   { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
</body>
</html>
